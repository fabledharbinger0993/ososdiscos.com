name: ososdisco.com

on:
 push:
  branches:
   - main

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
   - uses: actions/checkout@v3

   - uses: actions/setup-node@v3
     with:
      node-version: 20.9.0

   - name: Install Frontend
     run: |
      cd frontend
      npm install
      npm run build

   - name: Install Backend
     run: |
      cd backend
      npm install